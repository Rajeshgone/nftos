<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-widt, initial-scale=1.0">
    
    <meta name="base:app_id" content="6a0cc06e6b7916c4b4095282" />
    <title>NFTOS • Base</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --accent: #7c3aed;
            --text: #e0e0ff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(180deg, #0a0a0f 0%, #1a0f2e 100%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        nav {
            background: rgba(10,10,15,0.98);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #2a2a3a;
        }
        .nav-container {
            max-width: 1480px;
            margin: auto;
            padding: 0 32px;
            display: flex;
            align-items: center;
            height: 85px;
            gap: 40px;
        }
        .logo {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #7c3aed, #c026d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-tabs {
            display: flex;
            gap: 32px;
            font-weight: 600;
        }
        .nav-tabs a {
            color: #b3b3cc;
            text-decoration: none;
            padding: 8px 0;
            transition: 0.3s;
        }
        .nav-tabs a:hover, .nav-tabs a.active { color: white; border-bottom: 3px solid var(--accent); }

        .search {
            flex: 1;
            max-width: 520px;
            background: #1f1f2e;
            border: 1px solid #3a3a4f;
            border-radius: 9999px;
            padding: 14px 24px;
            color: white;
            font-size: 16px;
        }

        .hero {
            padding: 120px 20px 80px;
            text-align: center;
            background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(192,38,211,0.1));
        }
        .hero h1 {
            font-size: 62px;
            font-weight: 900;
            margin-bottom: 16px;
        }
        .hero p { font-size: 22px; color: #a5a5cc; }

        .section {
            max-width: 1480px;
            margin: 60px auto;
            padding: 0 32px;
        }
        h2 {
            font-size: 28px;
            margin-bottom: 28px;
            font-weight: 700;
        }
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }
        .card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s;
            border: 1px solid #25253a;
        }
        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px -15px rgba(124, 58, 237, 0.4);
        }
        .nft-img {
            height: 320px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 120px;
            border-bottom: 1px solid #2a2a3a;
        }
        .nft-info {
            padding: 20px;
        }
        .nft-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .price {
            color: #67e8f9;
            font-size: 19px;
            font-weight: 700;
        }
        .btn-primary {
            background: linear-gradient(90deg, #7c3aed, #c026d3);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
        }
        .connect-btn {
            background: linear-gradient(90deg, #7c3aed, #c026d3);
            color: white;
            padding: 12px 32px;
            border-radius: 9999px;
            font-weight: 600;
            border: none;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="logo">NFTOS</div>
        <div class="nav-tabs">
            <a href="#" class="active">Explore</a>
            <a href="#">Mint</a>
            <a href="#">Trade</a>
            <a href="#">Stats</a>
        </div>
        <input type="text" class="search" placeholder="Search collections, NFTs...">
        <button onclick="connectWallet()" class="connect-btn">Connect Wallet</button>
    </div>
</nav>

<div class="hero">
    <h1>The Premier NFT Marketplace on Base</h1>
    <p>Discover • Mint • Trade • Earn</p>
</div>

<div class="section">
    <h2>Featured Collections</h2>
    <div class="nft-grid" id="featuredGrid"></div>
</div>

<div class="section">
    <h2>Trending on Base</h2>
    <div class="nft-grid" id="trendingGrid"></div>
</div>

<div class="section">
    <h2>Mint New NFT</h2>
    <div style="max-width: 580px; margin: auto; background: #12121a; padding: 50px; border-radius: 24px; text-align: center;">
        <input id="uri" placeholder="Image URL / IPFS Link" style="width:100%; padding:18px; background:#1f1f2e; border:none; border-radius:16px; color:white; font-size:17px; margin-bottom:20px;">
        <button onclick="mintNFT()" class="btn-primary">Mint NFT — 0.0008 ETH</button>
    </div>
</div>

<script>
// CONFIG
const CONTRACT_ADDRESS = "0x0000000000000000000000000000000000000000"; // Update after deploy

const ABI = ["function mint(string uri) public payable"];

let contract;

// Connect Wallet
async function connectWallet() {
    if (!window.ethereum) return alert("MetaMask not found!");
    const provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    const signer = await provider.getSigner();
    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    alert("✅ Wallet Connected!");
}

// Mint Function
async function mintNFT() {
    if (!contract) return alert("Please connect wallet first");
    const uri = document.getElementById("uri").value.trim() || "https://picsum.photos/id/1015/600";
    try {
        const tx = await contract.mint(uri, { value: ethers.parseEther("0.0008") });
        alert("Transaction sent: " + tx.hash);
        await tx.wait();
        alert("🎉 NFT Minted Successfully!");
    } catch (e) {
        alert("Error: " + (e.shortMessage || e.message));
    }
}

// Load Premium Cards
function loadCards() {
    const html = `
        <div class="card">
            <div class="nft-img">🌌</div>
            <div class="nft-info">
                <div class="nft-name">Cosmic Legends</div>
                <div class="price">0.012 ETH</div>
                <button class="btn-primary">Buy Now</button>
            </div>
        </div>
        <div class="card">
            <div class="nft-img">🔥</div>
            <div class="nft-info">
                <div class="nft-name">Neon Rebels</div>
                <div class="price">0.008 ETH</div>
                <button class="btn-primary">Buy Now</button>
            </div>
        </div>
        <div class="card">
            <div class="nft-img">🦊</div>
            <div class="nft-info">
                <div class="nft-name">Base Fox Club</div>
                <div class="price">0.015 ETH</div>
                <button class="btn-primary">Buy Now</button>
            </div>
        </div>
        <div class="card">
            <div class="nft-img">🌊</div>
            <div class="nft-info">
                <div class="nft-name">Ocean Realms</div>
                <div class="price">0.009 ETH</div>
                <button class="btn-primary">Buy Now</button>
            </div>
        </div>
    `;
    document.getElementById("featuredGrid").innerHTML = html;
    document.getElementById("trendingGrid").innerHTML = html;
}

loadCards();
</script>
</body>
</html>
