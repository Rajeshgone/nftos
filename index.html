<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="base:app_id" content="6a0cc06e6b7916c4b4095282" />
    <title>NFTOS • Base</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #111118;
            --accent: #6366f1;
            --text: #f0f0f5;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        nav {
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #1f1f2e;
        }
        .nav-container {
            max-width: 1480px;
            margin: auto;
            padding: 0 32px;
            display: flex;
            align-items: center;
            height: 80px;
            gap: 32px;
        }
        .logo {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .search {
            flex: 1;
            max-width: 580px;
            background: #1a1a24;
            border: 1px solid #2a2a38;
            border-radius: 9999px;
            padding: 14px 24px;
            font-size: 16px;
            color: white;
        }
        .nav-links a {
            color: #b3b3cc;
            text-decoration: none;
            font-weight: 500;
            margin-left: 32px;
            transition: 0.3s;
        }
        .nav-links a:hover { color: white; }

        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #2a1a3d 100%);
            text-align: center;
            padding: 140px 20px 100px;
        }
        .hero h1 {
            font-size: 68px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 16px;
            letter-spacing: -2px;
        }
        .hero p {
            font-size: 24px;
            color: #a0a0cc;
            max-width: 700px;
            margin: 0 auto;
        }

        .section {
            max-width: 1480px;
            margin: 80px auto;
            padding: 0 32px;
        }
        h2 {
            font-size: 32px;
            margin-bottom: 32px;
            font-weight: 700;
        }
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
        }
        .card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #1f1f2e;
        }
        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgb(99 102 241 / 0.25);
        }
        .nft-img {
            height: 300px;
            background: linear-gradient(45deg, #1f1f2e, #2a2a3a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px;
            border-bottom: 1px solid #25253a;
        }
        .nft-info {
            padding: 20px;
        }
        .nft-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .price {
            color: #67e8f9;
            font-size: 20px;
            font-weight: 700;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 12px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            color: white;
            border: none;
        }
        .connect-btn {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            color: white;
            padding: 12px 28px;
            border-radius: 9999px;
            font-weight: 600;
            border: none;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="logo">NFTOS</div>
        <input type="text" class="search" placeholder="Search NFTs, collections, creators..." />
        <div class="nav-links">
            <a href="#">Explore</a>
            <a href="#">Stats</a>
            <a href="#">Create</a>
        </div>
        <button onclick="connectWallet()" class="connect-btn">Connect Wallet</button>
    </div>
</nav>

<div class="hero">
    <h1>The Fastest NFT Marketplace on Base</h1>
    <p>Low fees • Real community • Built for creators</p>
</div>

<div class="section">
    <h2>Trending on Base</h2>
    <div class="nft-grid" id="marketGrid"></div>
</div>

<div class="section">
    <h2>Mint Your NFT</h2>
    <div style="max-width: 560px; margin: auto; background: #111118; padding: 48px; border-radius: 24px; text-align:center;">
        <input id="uri" placeholder="Paste Image URL or IPFS link" style="width:100%; padding:16px; background:#1a1a24; border:none; border-radius:16px; color:white; font-size:16px; margin-bottom:20px;">
        <button onclick="mintNFT()" class="btn btn-primary">Mint NFT — Only 0.0008 ETH</button>
    </div>
</div>

<script>
// CONFIG
const CONTRACT_ADDRESS = "0x0000000000000000000000000000000000000000"; // ← Update after deploy

const ABI = [
    "function mint(string uri) public payable"
];

let contract;

// Connect Wallet
async function connectWallet() {
    if (!window.ethereum) return alert("Please install MetaMask");
    const provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    const signer = await provider.getSigner();
    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    alert("✅ Wallet Connected Successfully!");
}

// Mint
async function mintNFT() {
    if (!contract) return alert("Please connect your wallet first");
    const uri = document.getElementById("uri").value.trim() || "https://picsum.photos/id/1015/600";
    try {
        const tx = await contract.mint(uri, { value: ethers.parseEther("0.0008") });
        alert("Transaction sent: " + tx.hash);
        await tx.wait();
        alert("🎉 Congratulations! Your NFT has been minted!");
    } catch (e) {
        alert("Error: " + (e.shortMessage || e.message));
    }
}

// Trending NFTs (Professional Look)
function loadTrending() {
    const grid = document.getElementById("marketGrid");
    grid.innerHTML = `
        <div class="card"><div class="nft-img">🌌</div><div class="nft-info"><div class="nft-name">Cosmic Voyager #42</div><div class="price">0.012 ETH</div><button class="btn btn-primary">Buy Now</button></div></div>
        <div class="card"><div class="nft-img">🔥</div><div class="nft-info"><div class="nft-name">Neon Rebel #1337</div><div class="price">0.008 ETH</div><button class="btn btn-primary">Buy Now</button></div></div>
        <div class="card"><div class="nft-img">🦊</div><div class="nft-info"><div class="nft-name">Base Fox #69</div><div class="price">0.015 ETH</div><button class="btn btn-primary">Buy Now</button></div></div>
        <div class="card"><div class="nft-img">🌊</div><div class="nft-info"><div class="nft-name">Ocean Whisper #07</div><div class="price">0.009 ETH</div><button class="btn btn-primary">Buy Now</button></div></div>
    `;
}

loadTrending();
</script>
</body>
</html>
