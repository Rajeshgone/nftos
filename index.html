<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="base:app_id" content="6a0cc06e6b7916c4b4095282" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFTOS Base • Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>

    <style>
        :root { --primary: #6366f1; --accent: #a855f7; }
        body {
            margin: 0; font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #1a2338 100%);
            color: #fff; min-height: 100vh;
        }
        .container { max-width: 1280px; margin: auto; padding: 16px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1e2937; flex-wrap: wrap; }
        .logo { font-size: 32px; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 28px; margin-top: 30px; }
        .card {
            background: #121a2f; border-radius: 20px; overflow: hidden; transition: all 0.4s;
        }
        .card:hover { transform: translateY(-12px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4); }
        .nft-img {
            height: 280px; display: flex; align-items: center; justify-content: center;
            font-size: 120px; background: linear-gradient(45deg, #1e2937, #334155);
        }
        .nft-info { padding: 18px; }
        .price { color: #22d3ee; font-weight: 700; font-size: 18px; }
        button {
            padding: 12px 24px; border: none; border-radius: 12px; font-size: 16px;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .section { margin: 70px 0; display: none; }
        .section.active { display: block; }
        .hero { text-align: center; padding: 100px 20px 80px; background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.1)); border-radius: 24px; margin: 30px 0; }
    </style>
</head>
<body>
<div class="container">

    <header>
        <div class="logo">NFTOS Base</div>
        <div>
            <button onclick="connectWallet()" class="btn-primary" style="padding:10px 22px;">Connect Wallet</button>
        </div>
    </header>

    <div class="hero">
        <h1>Discover, Mint & Trade<br>on NFTOS Base</h1>
        <p>Real ERC721 Marketplace on Base</p>
    </div>

    <!-- EXPLORE -->
    <div id="exploreSection" class="section active">
        <h2>Live Marketplace</h2>
        <div class="nft-grid" id="marketGrid"></div>
    </div>

    <!-- MINT -->
    <div id="mintSection" class="section">
        <h2>Mint New NFT</h2>
        <div class="card" style="max-width:600px; margin:auto; padding:40px;">
            <input id="uri" placeholder="Image URL / IPFS / Emoji" style="width:100%; padding:12px; margin:10px 0; background:#1e2937; border:none; border-radius:12px; color:white;">
            <button onclick="mintNFT()" class="btn-primary">Mint NFT (0.0008 ETH)</button>
        </div>
    </div>

    <!-- MY COLLECTION -->
    <div id="mySection" class="section">
        <h2>My Collection</h2>
        <div class="nft-grid" id="myGrid"></div>
    </div>

    <div style="text-align:center; margin:50px 0;">
        <button onclick="showSection('explore')" class="btn-outline">Explore</button>
        <button onclick="showSection('mint')" class="btn-primary" style="margin:0 10px;">Mint</button>
        <button onclick="showSection('my')" class="btn-outline">My Collection</button>
    </div>
</div>

<script>
// ================== CONFIG ==================
const CONTRACT_ADDRESS = "0x0000000000000000000000000000000000000000"; // ← CHANGE AFTER DEPLOY

const ABI = [
    "function mint(string uri) public payable",
    "function list(uint256 tokenId, uint256 price) public",
    "function buy(uint256 tokenId) public payable",
    "function cancelListing(uint256 tokenId) public",
    "function ownerOf(uint256 tokenId) public view returns (address)",
    "function tokenURI(uint256 tokenId) public view returns (string)",
    "function listings(uint256) public view returns (address seller, uint256 price, bool active)",
    "event Minted(uint256 tokenId, address owner, string uri)",
    "event Listed(uint256 tokenId, uint256 price)",
    "event Sold(uint256 tokenId, address buyer, uint256 price)"
];

let provider, signer, address = "";
let contract;

// ================== CONNECT WALLET ==================
async function connectWallet() {
    if (!window.ethereum) return alert("Please install MetaMask!");
    
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    address = await signer.getAddress();

    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    
    document.getElementById("exploreSection").classList.add("active");
    alert("Wallet Connected!\n\nNow deploy your contract and update CONTRACT_ADDRESS");
    loadMarketplace();
}

// ================== MINT ==================
async function mintNFT() {
    if (!contract) return alert("Connect wallet first");
    const uri = document.getElementById("uri").value || "https://example.com/nft.json";
    
    try {
        const tx = await contract.mint(uri, { value: ethers.parseEther("0.0008") });
        alert("Minting... Transaction sent: " + tx.hash);
        await tx.wait();
        alert("✅ NFT Minted Successfully!");
        loadMyCollection();
    } catch (e) {
        alert("Error: " + e.message);
    }
}

// ================== MARKETPLACE ==================
async function loadMarketplace() {
    // For demo, show placeholder. You can expand later with events or TheGraph
    document.getElementById("marketGrid").innerHTML = `
        <div class="card"><div class="nft-img">🌌</div><div class="nft-info"><h4>Coming Soon</h4><p>Live listings will appear here after deployment</p></div></div>
    `;
}

async function loadMyCollection() {
    if (!contract || !address) return;
    const grid = document.getElementById("myGrid");
    grid.innerHTML = "<p>Loading your NFTs...</p>";

    // Simple version: show placeholder
    grid.innerHTML = `
        <div class="card">
            <div class="nft-img">🖼️</div>
            <div class="nft-info">
                <h4>Your NFT</h4>
                <button onclick="listForSale(0)" class="btn-primary" style="margin-top:10px;">List for Sale</button>
            </div>
        </div>
    `;
}

function listForSale(tokenId) {
    const price = prompt("Enter price in ETH (e.g. 0.05):");
    if (price) alert(`Listing token #${tokenId} for ${price} ETH...`);
}

function showSection(sec) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    if (sec === 'explore') document.getElementById("exploreSection").classList.add("active");
    if (sec === 'mint') document.getElementById("mintSection").classList.add("active");
    if (sec === 'my') {
        document.getElementById("mySection").classList.add("active");
        loadMyCollection();
    }
}

// Init
showSection('explore');
</script>
</body>
</html>
