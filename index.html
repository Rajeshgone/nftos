<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="base:app_id" content="6a0cc06e6b7916c4b4095282" />
    <title>NFTOS • Base</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
    
    <style>
        :root {
            --bg: #0a0b0f;
            --card: #11131f;
            --text: #e0e0e0;
            --primary: #6366f1;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
        }
        nav {
            background: rgba(10,11,15,0.95);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #1f2233;
        }
        .nav-container {
            max-width: 1400px;
            margin: auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 76px;
            gap: 24px;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .search {
            flex: 1;
            max-width: 520px;
            background: #1a1d2e;
            border-radius: 9999px;
            padding: 10px 20px;
            border: 1px solid #2a2f45;
            color: white;
        }
        .nav-links a {
            color: #aaa;
            text-decoration: none;
            margin-left: 28px;
            font-weight: 500;
        }
        .nav-links a:hover { color: white; }

        .hero {
            background: linear-gradient(135deg, #1a1f38, #2a1a3d);
            text-align: center;
            padding: 120px 20px 80px;
        }
        .hero h1 {
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 16px;
        }
        .hero p { font-size: 22px; color: #aaa; }

        .section {
            max-width: 1400px;
            margin: 60px auto;
            padding: 0 24px;
        }
        h2 {
            font-size: 28px;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            padding-bottom: 8px;
        }
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }
        .card {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid #1f2233;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
        }
        .nft-img {
            height: 260px;
            background: #1f2233;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            border-bottom: 1px solid #2a2f45;
        }
        .nft-info {
            padding: 16px;
        }
        .nft-name {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .price {
            color: #22d3ee;
            font-weight: 700;
            font-size: 18px;
        }
        button {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: white;
        }
        .connect-btn {
            background: var(--primary);
            color: white;
            padding: 10px 24px;
            border-radius: 9999px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="logo">NFTOS</div>
        <input type="text" class="search" placeholder="Search NFTs, collections..." />
        <div class="nav-links">
            <a href="#">Explore</a>
            <a href="#">Stats</a>
            <a href="#">Create</a>
        </div>
        <button onclick="connectWallet()" class="connect-btn">Connect Wallet</button>
    </div>
</nav>

<div class="hero">
    <h1>The Fastest NFT Marketplace on Base</h1>
    <p>Low fees • Real community • Built for creators</p>
</div>

<div class="section">
    <h2>Trending on Base</h2>
    <div class="nft-grid" id="marketGrid"></div>
</div>

<div class="section">
    <h2>Mint New NFT</h2>
    <div style="max-width: 500px; margin: auto; background: #11131f; padding: 40px; border-radius: 20px;">
        <input id="uri" placeholder="Image URL or IPFS link" style="width:100%; padding:14px; background:#1a1d2e; border:none; border-radius:12px; color:white; margin-bottom:16px;">
        <button onclick="mintNFT()" class="btn-primary">Mint NFT — 0.0008 ETH</button>
    </div>
</div>

<script>
// ================== CONFIG ==================
const CONTRACT_ADDRESS = "0x0000000000000000000000000000000000000000"; // ← Update after deploy

const ABI = [
    "function mint(string uri) public payable",
    "function list(uint256 tokenId, uint256 price) public",
    "function buy(uint256 tokenId) public payable",
    "function tokenURI(uint256 tokenId) public view returns (string)"
];

let provider, signer, address = "";
let contract;

// Connect Wallet
async function connectWallet() {
    if (!window.ethereum) return alert("Please install MetaMask");
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    address = await signer.getAddress();
    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    alert("✅ Wallet Connected!");
    loadMarketplace();
}

// Mint
async function mintNFT() {
    if (!contract) return alert("Please connect wallet first");
    const uri = document.getElementById("uri").value || "https://picsum.photos/id/237/400";
    try {
        const tx = await contract.mint(uri, { value: ethers.parseEther("0.0008") });
        alert("Minting... Tx: " + tx.hash);
        await tx.wait();
        alert("🎉 NFT Minted Successfully!");
    } catch (e) {
        alert("Error: " + (e.shortMessage || e.message));
    }
}

// Demo Marketplace
function loadMarketplace() {
    const grid = document.getElementById("marketGrid");
    grid.innerHTML = `
        <div class="card">
            <div class="nft-img">🌌</div>
            <div class="nft-info">
                <div class="nft-name">Cosmic Dream #001</div>
                <div class="price">0.008 ETH</div>
                <button onclick="alert('Buy feature coming soon')" style="margin-top:12px" class="btn-primary">Buy Now</button>
            </div>
        </div>
    `;
}

// Init
loadMarketplace();
</script>
</body>
</html>
