<!DOCTYPE html>
<html lang="en">
<head>
<meta name="base:app_id" content="6a041d1e2be96789d34cefe3" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>baseNFTOS • Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.11.0/dist/index.umd.js"></script>

<style>
    :root {
        --primary: #6366f1;
    }
    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #0b1220 0%, #1a2338 100%);
        color: #fff;
        min-height: 100vh;
    }
    .container {
        max-width: 1200px;
        margin: auto;
        padding: 16px;
    }
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 0;
        border-bottom: 1px solid #1e2937;
    }
    .logo {
        font-size: 28px;
        font-weight: bold;
        background: linear-gradient(90deg, #6366f1, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    nav a {
        color: #cbd5e1;
        margin: 0 16px;
        text-decoration: none;
        font-weight: 500;
    }
    nav a:hover {
        color: #fff;
    }
    .hero {
        text-align: center;
        padding: 80px 20px 60px;
        background: rgba(99, 102, 241, 0.1);
        border-radius: 20px;
        margin-bottom: 40px;
    }
    .hero h1 {
        font-size: 48px;
        margin: 0 0 16px;
    }
    .hero p {
        font-size: 20px;
        color: #94a3b8;
        max-width: 600px;
        margin: auto;
    }
    button {
        padding: 12px 24px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s;
    }
    .btn-primary {
        background: var(--primary);
        color: white;
        width: 100%;
    }
    .btn-outline {
        background: transparent;
        border: 2px solid #6366f1;
        color: #6366f1;
    }
    .card {
        background: #121a2f;
        border-radius: 16px;
        overflow: hidden;
        transition: transform 0.3s;
    }
    .card:hover {
        transform: translateY(-8px);
    }
    .nft-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 24px;
        margin-top: 30px;
    }
    .nft-img {
        width: 100%;
        height: 260px;
        object-fit: cover;
        background: #1e2937;
    }
    .nft-info {
        padding: 16px;
    }
    .nft-info h4 {
        margin: 0 0 8px;
    }
    .price {
        color: #22d3ee;
        font-weight: bold;
    }
    .section {
        margin: 60px 0;
    }
    h2 {
        font-size: 32px;
        margin-bottom: 20px;
    }
    .tab {
        display: inline-block;
        padding: 10px 24px;
        background: #1e2937;
        border-radius: 9999px;
        margin-right: 10px;
        cursor: pointer;
    }
    .tab.active {
        background: #6366f1;
    }
    input, textarea {
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        background: #1e2937;
        border: none;
        border-radius: 12px;
        color: white;
    }
    .wallet-info {
        background: #1e2937;
        padding: 16px;
        border-radius: 16px;
        margin-bottom: 30px;
    }
    small {
        color: #94a3b8;
    }
</style>
</head>

<body>
<div class="container">

    <!-- HEADER -->
    <header>
        <div class="logo">ArcNFT</div>
        <nav>
            <a href="#" onclick="showSection('explore')">Explore</a>
            <a href="#" onclick="showSection('mint')">Mint</a>
            <a href="#" onclick="showSection('mycollection')">My Collection</a>
        </nav>
        <div>
            <button onclick="connectInjected()" class="btn-primary" style="width:auto; padding:10px 20px;">Connect Wallet</button>
            <button onclick="connectWC()" class="btn-outline" style="width:auto; padding:10px 20px; margin-left:10px;">WalletConnect</button>
        </div>
    </header>

    <!-- WALLET INFO -->
    <div class="wallet-info" id="walletInfo" style="display:none;">
        <b>Connected:</b> <small id="addr">0x...</small><br>
        <span id="bal">0.00 ETH</span>
    </div>

    <!-- HERO -->
    <div class="hero" id="hero">
        <h1>Discover Digital Art on Arc Testnet</h1>
        <p>Fast, cheap, and secure NFT marketplace built for the Arc ecosystem</p>
        <button onclick="showSection('mint')" style="margin-top:30px; padding:16px 40px; font-size:18px;">Mint Your First NFT</button>
    </div>

    <!-- EXPLORE SECTION -->
    <div id="exploreSection" class="section">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Featured NFTs</h2>
            <div>
                <span class="tab active" onclick="filterCategory(this)">All</span>
                <span class="tab" onclick="filterCategory(this)">Art</span>
                <span class="tab" onclick="filterCategory(this)">Collectibles</span>
            </div>
        </div>

        <div class="nft-grid" id="nftGrid">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- MINT SECTION -->
    <div id="mintSection" class="section" style="display:none;">
        <h2>Mint New NFT</h2>
        <div class="card" style="max-width:600px; margin:auto; padding:30px;">
            <input id="nftName" placeholder="NFT Name (e.g. Arc Warrior #42)">
            <textarea id="nftDesc" rows="3" placeholder="Description..."></textarea>
            <input id="nftPrice" placeholder="List Price (in USDC)" value="0.05">
            
            <div style="margin:20px 0; text-align:center; background:#1e2937; padding:40px; border-radius:12px;">
                <p style="color:#64748b;">Image Preview (Demo)</p>
                <div style="width:180px; height:180px; background:linear-gradient(45deg,#6366f1,#a855f7); margin:auto; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:60px;">
                    🛡️
                </div>
            </div>

            <button onclick="mintNFT()" class="btn-primary">Mint NFT • 0.001 ARC</button>
            <small style="display:block; text-align:center; margin-top:10px;">Gas fees are extremely low on Arc Testnet</small>
        </div>
    </div>

    <!-- MY COLLECTION -->
    <div id="myCollectionSection" class="section" style="display:none;">
        <h2>My Collection</h2>
        <div class="nft-grid" id="myCollectionGrid">
            <!-- Populated by JS -->
        </div>
    </div>

</div>

<script>
// ============== CONFIG ==============
const ARC_CHAIN = {
  chainId: "0x4CE3F2",
  chainName: "Arc Testnet",
  rpcUrls: ["https://rpc.testnet.arc.network"],
  nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
  blockExplorerUrls: ["https://testnet.arcscan.app"]
};

const WC_PROJECT_ID = "REPLACE_WITH_YOUR_PROJECT_ID"; // ← Change this

let provider, signer, address;
let myNFTs = [];

// Sample NFTs
const sampleNFTs = [
    { id:1, name:"Arc Guardian #1", price:"0.12", image:"🛡️", owner:"0x123...", category:"Art" },
    { id:2, name:"Neon Samurai", price:"0.45", image:"⚔️", owner:"0xabc...", category:"Collectibles" },
    { id:3, name:"Cosmic Bloom", price:"0.08", image:"🌌", owner:"0xdef...", category:"Art" },
    { id:4, name:"Pixel Legend", price:"0.22", image:"🎮", owner:"0x456...", category:"Collectibles" }
];

// ============== WALLET ==============
async function connectInjected() {
    if (!window.ethereum) return alert("No injected wallet found");
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    address = await signer.getAddress();
    await ensureNetwork();
    initUI();
}

async function connectWC() {
    const wc = await window.EthereumProvider.init({
        projectId: WC_PROJECT_ID,
        chains: [5042002],
        showQrModal: true
    });
    await wc.connect();
    provider = new ethers.BrowserProvider(wc);
    signer = await provider.getSigner();
    address = await signer.getAddress();
    await ensureNetwork();
    initUI();
}

async function ensureNetwork() {
    try {
        await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: ARC_CHAIN.chainId }]
        });
    } catch {
        await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [ARC_CHAIN]
        });
    }
}

function initUI() {
    document.getElementById("walletInfo").style.display = "block";
    document.getElementById("addr").textContent = address.slice(0,6) + "..." + address.slice(-4);
    document.getElementById("bal").textContent = "12.45 USDC";
    renderExplore();
    renderMyCollection();
}

// ============== RENDERING ==============
function renderExplore() {
    const grid = document.getElementById("nftGrid");
    grid.innerHTML = sampleNFTs.map(nft => `
        <div class="card">
            <div class="nft-img" style="font-size:120px; display:flex; align-items:center; justify-content:center; background:#1e2937;">
                ${nft.image}
            </div>
            <div class="nft-info">
                <h4>${nft.name}</h4>
                <div style="display:flex; justify-content:space-between; margin-top:10px;">
                    <div><small>Price</small><br><span class="price">${nft.price} USDC</span></div>
                    <button onclick="buyNFT(${nft.id})" class="btn-primary" style="width:auto; padding:8px 20px;">Buy Now</button>
                </div>
            </div>
        </div>
    `).join('');
}

function renderMyCollection() {
    const grid = document.getElementById("myCollectionGrid");
    if (myNFTs.length === 0) {
        grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#64748b;">You don't own any NFTs yet. Mint some!</p>`;
        return;
    }
    grid.innerHTML = myNFTs.map(nft => `
        <div class="card">
            <div class="nft-img" style="font-size:120px; display:flex; align-items:center; justify-content:center;">${nft.image}</div>
            <div class="nft-info">
                <h4>${nft.name}</h4>
                <small>Owned by you</small>
            </div>
        </div>
    `).join('');
}

function filterCategory(el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    // In real app you would filter here
}

// ============== ACTIONS ==============
async function mintNFT() {
    if (!signer) return alert("Please connect wallet first");

    const name = document.getElementById("nftName").value || "Untitled ArcNFT #" + Math.floor(Math.random()*1000);
    
    // Simulate minting
    const newNFT = {
        id: Date.now(),
        name: name,
        image: "🌟",
        price: "0.00"
    };
    
    myNFTs.unshift(newNFT);
    renderMyCollection();
    
    alert(`🎉 Successfully minted "${name}"!\n\nTransaction would appear on https://testnet.arcscan.app`);
    
    // Switch to My Collection
    showSection('mycollection');
}

function buyNFT(id) {
    if (!address) return alert("Connect wallet to buy");
    alert(`✅ Purchase successful!\nNFT #${id} transferred to your wallet.\n\n(This is a demo)`);
}

// ============== SECTION SWITCH ==============
function showSection(section) {
    document.getElementById("exploreSection").style.display = section === 'explore' ? 'block' : 'none';
    document.getElementById("mintSection").style.display = section === 'mint' ? 'block' : 'none';
    document.getElementById("myCollectionSection").style.display = section === 'mycollection' ? 'block' : 'none';
    
    if (section === 'explore') renderExplore();
    if (section === 'mycollection') renderMyCollection();
}

// Init
showSection('explore');
renderExplore();
</script>
</body>
</html>
